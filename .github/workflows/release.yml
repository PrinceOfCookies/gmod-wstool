name: Release

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-wix
        run: cargo install cargo-wix
      - name: Build and package MSI
        run: cargo wix --output target/wix/gmod-wstool.msi
      - uses: softprops/action-gh-release@v3
        with:
          files: target/wix/*.msi

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release
      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_amd64.deb -o nfpm.deb
          sudo dpkg -i nfpm.deb
      - name: Package deb and rpm
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${VERSION#v}"
          nfpm package -p deb -t .
          nfpm package -p rpm -t .
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            *.deb
            *.rpm
